<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://script.google.com" />
    <link rel="dns-prefetch" href="https://script.google.com" />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #ffffff;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 10px;
      }

      .label {
        font-size: 14px;
        color: #666;
        margin-bottom: 10px;
      }
      .number {
        font-size: 36px;
        font-weight: bold;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        font-size: 14px;
      }

      .datetime {
        white-space: nowrap;
      }
      #myChart {
        max-width: 100%;
        height: 300px;
      }
    </style>
  </head>

  <body>
    <div style="height: 300px; padding: 10px">
      <canvas id="myChart"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbws6sDV7OiEJJ97FP0kJrFItrKxfl0QXTkF4zQtCQLZkgp5wCjoWEe5nbLOZjMNFc9I/exec";

      async function loadData() {
        try {
          const res = await fetch(API_URL);
          const data = await res.json();
          render(data);
        } catch (err) {
          console.error("API error:", err);
        }
      }

      loadData();
      setInterval(loadData, 30000);
    </script>
    <script>
      let chart;

      function render(data) {
        const filtered = data.labels
          .map((label, i) => ({
            label,
            value: Number(data.values[i]),
            index: i,
          }))
          .filter((item) => item.index !== 2); // ❗ remove "ประชาพิจารณ์"

        const labels = filtered.map((item) => item.label);
        const values = filtered.map((item) => item.value);

        const ctx = document.getElementById("myChart").getContext("2d");

        if (chart) {
          chart.data.labels = labels;
          chart.data.datasets[0].data = values;
          chart.update();
          return;
        }

        chart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "จำนวนเรื่อง",
                data: values,
                borderWidth: 1,
                backgroundColor: ["#e74c3c", "#3498db", "#f39c12", "#2ecc71"],
              },
            ],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    return ` ${context.raw} เรื่อง`;
                  },
                },
              },
            },
            scales: {
              x: {
                beginAtZero: true,
                min: 0,
                max: Math.max(5, Math.ceil(Math.max(...values) / 5) * 5),
                ticks: {
                  stepSize: 5,
                },
              },
            },
          },
        });
      }
    </script>
  </body>
</html>
