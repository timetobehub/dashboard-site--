<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://script.google.com">
<link rel="dns-prefetch" href="https://script.google.com">
<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#ffffff;
}
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap:20px;
  padding:10px;
}
.card {
  background:#ffffff;
  border-radius:16px;
  padding:20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  text-align:center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* .card:nth-child(1) { border-top: 5px solid #e74c3c; }
.card:nth-child(2) { border-top: 5px solid #3498db; }
.card:nth-child(3) { border-top: 5px solid #f39c12; }
.card:nth-child(4) { border-top: 5px solid #2ecc71; }
.card:nth-child(1) .number { color: #e74c3c; }
.card:nth-child(2) .number { color: #3498db; }
.card:nth-child(3) .number { color: #f39c12; }
.card:nth-child(4) .number { color: #2ecc71; } */
.card-0 { border-top: 5px solid #e74c3c; }
.card-1 { border-top: 5px solid #3498db; }
.card-2 { border-top: 5px solid #f39c12; }
.card-3 { border-top: 5px solid #2ecc71; }

.card-0 .number { color: #e74c3c; }
.card-1 .number { color: #3498db; }
.card-2 .number { color: #f39c12; }
.card-3 .number { color: #2ecc71; }

.label {
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}
.number {
  font-size:36px;
  font-weight:bold;
}
  
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  font-size: 14px;
}

.datetime {
  white-space: nowrap;
}
  #myChart {
  max-width: 100%;
  height: 300px;
}
</style>
</head>

<body>
  
<div class="header">
  <div class="datetime">📆 <span id="datetime"></span></div>
</div>

<canvas id="myChart"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbws6sDV7OiEJJ97FP0kJrFItrKxfl0QXTkF4zQtCQLZkgp5wCjoWEe5nbLOZjMNFc9I/exec";


async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();
  render(data);
}

loadData();
setInterval(loadData, 30000);
</script>
<script>
function updateDateTime() {
  const now = new Date();

  const formatter = new Intl.DateTimeFormat('th-TH-u-ca-buddhist', {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    weekday: 'short',
    hour: '2-digit',
    minute: '2-digit'
  });

  document.getElementById("datetime").innerHTML = formatter.format(now);
}

updateDateTime();
</script>
<script>
  let chart;

function render(data) {
  const filtered = data.labels
    .map((label, i) => ({ label, value: Number(data.values[i]), index: i }))
    .filter(item => item.index !== 4); // ❗ remove "เรื่องที่รับทั้งหมด"

  const labels = filtered.map(item => item.label);
  const values = filtered.map(item => item.value);

  const ctx = document.getElementById('myChart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'จำนวนเรื่อง',
        data: values,
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(context) {
              return ` ${context.raw} เรื่อง`;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            precision: 0
          }
        }
      }
    }
  });
}
</script>
</body>
</html>
